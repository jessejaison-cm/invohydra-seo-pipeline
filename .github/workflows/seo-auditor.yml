name: InvoHydra SEO Auditor

on:

  # ──────────────────────────────────────────────────────────────────────────
  # Runs approximately every 3 weeks.
  # GitHub Actions cron doesn't support "every N weeks" natively, so we
  # schedule on the 1st and 22nd of each month at 4:00 AM IST (10:30 PM UTC).
  # This gives roughly 21-day intervals.
  # ──────────────────────────────────────────────────────────────────────────
  schedule:
    - cron: '30 22 1 * *'    # 1st of every month, 10:30 PM UTC = 4:00 AM IST
    - cron: '30 22 22 * *'   # 22nd of every month, 10:30 PM UTC = 4:00 AM IST

  # Allow manual trigger for on-demand audits
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-auditor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout the pipeline repo ──────────────────────────────────
      - name: Checkout Pipeline Repo
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.11 ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ─────────────────────────────────
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Create .env file from GitHub Secrets ────────────────────────
      - name: Configure Environment Variables
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
        run: |
          echo "GROQ_API_KEY=${GROQ_API_KEY}" >> .env
          echo "SERPER_API_KEY=${SERPER_API_KEY}" >> .env

      # ── 5. Clone the website repo to get published blogs ───────────────
      - name: Clone Website Repo for Published Blogs
        env:
          WEBSITE_REPO_PAT: ${{ secrets.WEBSITE_REPO_PAT }}
        run: |
          echo "📥 Cloning InvoHydra Landing Page (blog-automation branch) to read published blogs..."
          git clone --branch blog-automation "https://x-access-token:${WEBSITE_REPO_PAT}@github.com/InvoHydra/InvoHydra-Landing-Page.git" _website_repo
          
          # Clean up stale files from old naming convention (underscores instead of hyphens)
          STALE_FILE="_website_repo/src/app/blog/posts/gstin_validation_and_verification.json"
          if [ -f "$STALE_FILE" ]; then
            echo "🧹 Removing stale file: gstin_validation_and_verification.json"
            cd _website_repo
            git config user.name "InvoHydra SEO Bot"
            git config user.email "seo-bot@invohydra.com"
            git rm "src/app/blog/posts/gstin_validation_and_verification.json"
            git commit -m "🧹 Remove stale blog file from old naming convention"
            git push origin blog-automation
            cd ..
            echo "✅ Stale file removed and pushed."
          fi

          # Copy published blog JSON files into data/blogs/ so the auditor can read them
          mkdir -p data/blogs
          if [ -d "_website_repo/src/app/blog/posts" ]; then
            cp _website_repo/src/app/blog/posts/*.json data/blogs/ 2>/dev/null || echo "⚠️ No blog JSON files found in website repo."
            echo "✅ Copied $(ls data/blogs/*.json 2>/dev/null | wc -l) blog files for auditing."
          else
            echo "⚠️ Blog posts directory not found in website repo."
          fi
          
          # Clean up cloned repo
          rm -rf _website_repo


      # ── 6. Run the Performance Auditor ─────────────────────────────────
      - name: Run Performance Auditor (Agent 6)
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python -u -c "from agents.auditor import run_auditor; run_auditor()"

      # ── 7. Upload audit report ─────────────────────────────────────────
      - name: Archive Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: data/audit_report.json
          retention-days: 90
