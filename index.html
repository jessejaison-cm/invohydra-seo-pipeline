<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvoHydra SEO Pipeline - Blog Viewer</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
  
  <!-- Markdown parser library -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    :root {
      --bg-dark: #0b0f19;
      --panel-bg: rgba(22, 28, 45, 0.45);
      --panel-border: rgba(255, 255, 255, 0.08);
      --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.3);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --sidebar-width: 320px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar Styling */
    .sidebar {
      width: var(--sidebar-width);
      border-right: 1px solid var(--panel-border);
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--panel-border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.25rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.9rem;
      transition: all 0.2s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .blog-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .blog-item {
      padding: 14px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .blog-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .blog-item.active {
      background: rgba(139, 92, 246, 0.12);
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
    }

    .blog-item-title {
      font-weight: 600;
      font-size: 0.95rem;
      line-height: 1.4;
      color: var(--text-main);
    }

    .blog-item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tag {
      background: rgba(96, 165, 250, 0.15);
      color: #93c5fd;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    /* Content Area Styling */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(10, 15, 30, 0.4);
    }

    .content-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 16px;
      padding: 40px;
      text-align: center;
    }

    .content-placeholder svg {
      stroke: var(--text-muted);
      opacity: 0.3;
    }

    .reader-pane {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 48px 64px;
    }

    /* Rendered Article Typography */
    .article {
      max-width: 800px;
      margin: 0 auto;
      line-height: 1.75;
      font-size: 1.05rem;
      color: #d1d5db;
    }

    .article h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.75rem;
      line-height: 1.25;
      font-weight: 700;
      color: #fff;
      margin-bottom: 24px;
      background: linear-gradient(to right, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .article h2 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin-top: 40px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 8px;
    }

    .article h3 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff;
      margin-top: 30px;
      margin-bottom: 12px;
    }

    .article p {
      margin-bottom: 20px;
    }

    .article ul, .article ol {
      margin-bottom: 24px;
      padding-left: 24px;
    }

    .article li {
      margin-bottom: 8px;
    }

    .article strong {
      color: #fff;
      font-weight: 600;
    }

    .article blockquote {
      border-left: 4px solid var(--accent);
      background: rgba(139, 92, 246, 0.05);
      padding: 16px 24px;
      margin: 24px 0;
      border-radius: 0 8px 8px 0;
      font-style: italic;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* SEO Metadata Card Styling */
    .meta-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 36px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .meta-card-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
      margin-bottom: 4px;
    }
    .meta-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .meta-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .meta-value {
      font-size: 0.95rem;
      color: var(--text-main);
      line-height: 1.4;
    }
    .url-slug-badge {
      display: inline-block;
      align-self: flex-start;
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-family: monospace;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <span>⚡</span> InvoHydra SEO Hub
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search blog posts..." oninput="filterBlogs()">
      </div>
    </div>
    <div class="blog-list" id="blogList">
      <!-- Generated list items -->
    </div>
  </div>

  <!-- Content Area -->
  <div class="content-area">
    <!-- Empty State -->
    <div class="content-placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/>
        <path d="M6 6h10"/>
        <path d="M6 10h10"/>
      </svg>
      <h2>Select a blog post to preview</h2>
      <p>Click on any article in the sidebar to review the generated, SEO-optimized content.</p>
    </div>

    <!-- Reader Pane -->
    <div class="reader-pane" id="readerPane">
      <article class="article" id="articleBody">
        <!-- Rendered markdown goes here -->
      </article>
    </div>
  </div>

  <script>
    let allBlogs = [];

    // Fetch initial list of blogs from local Python server API
    async function loadBlogList() {
      try {
        const response = await fetch('/api/blogs');
        allBlogs = await response.json();
        renderBlogList(allBlogs);
      } catch (error) {
        console.error('Error fetching blog list:', error);
      }
    }

    function renderBlogList(blogs) {
      const container = document.getElementById('blogList');
      container.innerHTML = '';
      
      if (blogs.length === 0) {
        container.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 20px;">No blogs found.</div>';
        return;
      }

      blogs.forEach(blog => {
        const item = document.createElement('div');
        item.className = 'blog-item';
        item.onclick = () => selectBlog(blog, item);
        
        const isJson = blog.filename.endsWith('.json');
        item.innerHTML = `
          <div class="blog-item-title">${blog.title}</div>
          <div class="blog-item-meta">
            <span class="tag">SEO Post</span>
            <span>${isJson ? 'JSON + SEO' : 'Markdown'}</span>
          </div>
        `;
        container.appendChild(item);
      });
    }

    async function selectBlog(blog, element) {
      // Remove active class from all items
      document.querySelectorAll('.blog-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');

      try {
        const response = await fetch(`/api/blog/${encodeURIComponent(blog.filename)}`);
        
        let markdownText = "";
        let metaHtml = "";
        
        if (blog.filename.endsWith('.json')) {
          const blogData = await response.json();
          markdownText = blogData.markdown_body || "";
          
          metaHtml = `
            <div class="meta-card">
              <div class="meta-card-title">SEO Publishing Metadata</div>
              <div class="meta-field">
                <span class="meta-label">Meta Title</span>
                <span class="meta-value">${blogData.meta_title || ''}</span>
              </div>
              <div class="meta-field">
                <span class="meta-label">Meta Description</span>
                <span class="meta-value">${blogData.meta_description || ''}</span>
              </div>
              <div class="meta-field">
                <span class="meta-label">URL Slug</span>
                <span class="url-slug-badge">/${blogData.url_slug || ''}</span>
              </div>
            </div>
          `;
        } else {
          markdownText = await response.text();
        }
        
        // Hide placeholder and show reader
        document.getElementById('placeholder').style.display = 'none';
        const reader = document.getElementById('readerPane');
        reader.style.display = 'block';
        
        // Parse and set innerHTML (prepend metadata card if available)
        document.getElementById('articleBody').innerHTML = metaHtml + marked.parse(markdownText);
        reader.scrollTop = 0;
      } catch (error) {
        console.error('Error loading blog content:', error);
      }
    }

    function filterBlogs() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allBlogs.filter(blog => 
        blog.title.toLowerCase().includes(query) || 
        blog.filename.toLowerCase().includes(query)
      );
      renderBlogList(filtered);
    }

    // Load initial list on page load
    window.onload = loadBlogList;
  </script>
</body>
</html>
